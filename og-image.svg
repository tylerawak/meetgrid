    <rect x="50" y="8"  width="38" height="22" rx="3" fill="rgba(2,136,209,0.2)"/>
    <rect x="92" y="8"  width="38" height="22" rx="3" fill="rgba(2,136,209,0.5)"/>
    <rect x="134" y="8" width="38" height="22" rx="3" fill="rgba(2,136,209,0.2)"/>
