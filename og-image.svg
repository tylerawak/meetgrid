<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#0288d1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#04101e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#04101e"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect x="36" y="36" width="1128" height="558" rx="14" fill="none" stroke="rgba(2,136,209,0.15)" stroke-width="1"/>

